/* ===== TOKENS ===== */

    --good-bg: rgba(74, 222, 128, 0.1);

*, *::before, *::after { box-sizing: border-box; }

html, body { height: 100%; }

body {

  font-family: -apple-system, "SF Pro Text", "Segoe UI", system-ui, sans-serif;

  -webkit-tap-highlight-color: transparent;
  overflow: hidden;
  position: fixed;

}

.hidden { display: none !important; }

/* ===== SCREENS ===== */
.screen {
  max-width: 560px;

}

#home {

}

/* ===== HOME ===== */
.home-header {
  text-align: center;
  padding: 32px 0 4px;
}

.home-header h1 {
  margin: 0;
  font-size: 1.6rem;
  font-weight: 800;
  background: linear-gradient(135deg, var(--primary), #ec4899);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.home-sub {
  color: var(--text2);
  margin: 6px 0 0;
  font-size: 0.88rem;
}

.home-stats {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin: 16px 0 4px;
  font-size: 0.8rem;
  color: var(--text2);
}

.home-stats strong {
  display: block;
  font-size: 1.2rem;
  font-weight: 800;
  color: var(--primary);
}

/* Section cards */
.sections { display: grid; gap: 10px; margin: 16px 0; }

.sec-card {
  background: var(--panel);
  border: 2px solid var(--line);
  border-radius: var(--radius);
  padding: 14px 16px;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 8px;
  align-items: center;
  box-shadow: 0 2px 0 var(--line);
  -webkit-user-select: none;
  user-select: none;
}

.sec-body { cursor: pointer; }
.sec-body:active { opacity: 0.7; }
.sec-title { font-weight: 700; font-size: 0.92rem; line-height: 1.3; }
.sec-meta { font-size: 0.75rem; color: var(--text2); margin-top: 2px; }

.sec-right { display: flex; flex-direction: column; align-items: center; gap: 2px; }

.sec-ring { width: 46px; height: 46px; position: relative; }
.sec-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
.sec-ring .bg { fill: none; stroke: var(--line); stroke-width: 4; }
.sec-ring .fg { fill: none; stroke: var(--good); stroke-width: 4; stroke-linecap: round; transition: stroke-dashoffset 300ms ease; }
.sec-ring .lbl { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 0.68rem; font-weight: 800; color: var(--text2); }
.sec-card.done { border-color: var(--good); }
.sec-card.done .lbl { color: var(--good); }

.sec-reset {
  background: none; border: none; color: var(--text2); font-size: 0.82rem;
  padding: 2px 6px; border-radius: 6px; cursor: pointer; opacity: 0.5;
  box-shadow: none; text-transform: none; letter-spacing: 0; font-weight: 400;
}
.sec-reset:active { opacity: 1; transform: none; }

/* Home actions */
.home-actions {
  display: flex; flex-wrap: wrap; gap: 8px;
  justify-content: center; padding: 4px 0 28px;
}

/* ===== BUTTONS ===== */
button {
  border: 0; border-radius: var(--radius-sm);
  padding: 12px 20px; font: inherit; font-size: 0.9rem;
  cursor: pointer; font-weight: 700;
  transition: transform 60ms ease;
  text-transform: uppercase; letter-spacing: 0.03em;
}
button:active { transform: scale(0.96); }
button:disabled { cursor: not-allowed; opacity: 0.4; }

.primary { background: var(--primary); color: #fff; box-shadow: 0 4px 0 var(--primary-strong); }
.primary:active { box-shadow: none; transform: translateY(2px); }

.ghost { background: var(--card-bg); color: var(--text); border: 2px solid var(--line); box-shadow: 0 2px 0 var(--line); }
.ghost:active { box-shadow: none; transform: translateY(2px); }

.danger { color: var(--bad); border-color: var(--bad); }
.big { padding: 14px 24px; font-size: 0.92rem; border-radius: var(--radius); }

.icon-btn {
  width: 44px; height: 44px; padding: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem; border-radius: 50%;
}

/* ===== QUIZ NAV ===== */
.q-nav {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 0 4px; flex-shrink: 0;
}
.q-nav-info { flex: 1; min-width: 0; }
.q-nav-title { display: block; font-weight: 800; font-size: 0.88rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.q-nav-sub { font-size: 0.72rem; color: var(--text2); }

.streak {
  background: linear-gradient(135deg, var(--streak-from), var(--streak-to));
  color: #fff; font-weight: 800; font-size: 0.8rem;
  padding: 5px 12px; border-radius: 999px; white-space: nowrap;
  animation: pop 300ms ease;
}

.reset-btn { font-size: 1.1rem; color: var(--text2); }

/* Progress bar */
.prog-track { height: 10px; background: var(--line); border-radius: 999px; overflow: hidden; margin-bottom: 6px; flex-shrink: 0; }
.prog-fill { height: 100%; background: linear-gradient(90deg, var(--primary), #ec4899); border-radius: 999px; transition: width 300ms ease; }

/* ===== QUESTION CARD ===== */
.card { background: var(--panel); border: 2px solid var(--line); border-radius: var(--radius); }

.q-card {
  padding: 20px; flex: 1; overflow-y: auto;
  -webkit-overflow-scrolling: touch; min-height: 0;
  touch-action: pan-y;
  transition: transform 160ms ease, opacity 160ms ease;
}
.q-card.swipe-l { transform: translateX(-50px); opacity: 0.3; }
.q-card.swipe-r { transform: translateX(50px); opacity: 0.3; }

.q-num { font-size: 0.72rem; font-weight: 800; color: var(--primary); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
.q-text { margin: 0 0 18px; font-size: 1.15rem; font-weight: 700; line-height: 1.4; }

/* Options */
.opts { display: grid; gap: 8px; }

.opt {
  border: 2px solid var(--option-border); background: var(--card-bg);
  border-radius: var(--radius-sm); padding: 12px 14px;
  display: flex; gap: 12px; align-items: center;
  cursor: pointer; -webkit-user-select: none; user-select: none;
  box-shadow: var(--option-shadow);
  transition: border-color 80ms, background 80ms, transform 60ms, box-shadow 60ms;
}
.opt:active { transform: scale(0.98) translateY(1px); box-shadow: none; }
.opt.selected { border-color: var(--primary); background: var(--primary-bg); box-shadow: 0 2px 0 var(--primary-strong); }
.opt.correct { border-color: var(--good); background: var(--good-bg); box-shadow: 0 0 12px var(--good-glow), 0 2px 0 var(--good); }
.opt.incorrect { border-color: var(--bad); background: var(--bad-bg); box-shadow: 0 0 12px var(--bad-glow), 0 2px 0 var(--bad); }
.opt.locked { cursor: default; pointer-events: none; }
.opt.dimmed { opacity: 0.35; pointer-events: none; }
.opt input { display: none; }

.opt-mark {

.opt.incorrect .opt-mark { border-color: var(--bad); background: var(--bad); color: #fff; }

.fb strong { display: block; margin-bottom: 2px; font-size: 0.9rem; }
.fb.good { display: block; border: 2px solid var(--good); background: var(--good-bg); }

.fb.bad { display: block; border: 2px solid var(--bad); background: var(--bad-bg); }

.score-actions button { width: 100%; }

@keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
@keyframes slide-up { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
@keyframes pop { 0% { transform: scale(0.7); } 50% { transform: scale(1.15); } 100% { transform: scale(1); } }
@keyframes shake { 0%,100% { transform: translateX(0); } 20% { transform: translateX(-8px); } 40% { transform: translateX(8px); } 60% { transform: translateX(-5px); } 80% { transform: translateX(5px); } }
@keyframes card-pop { 0% { transform: scale(1); } 50% { transform: scale(1.015); } 100% { transform: scale(1); } }
.shake { animation: shake 350ms ease; }

@media (min-width: 480px) {

  .q-text { font-size: 1.3rem; }
  .q-card { padding: 28px 24px; }
}

<script>
/* ===== STATE ===== */
let quiz, secs, activeQs = [], answers = new Map(), idx = 0, streak = 0, best = 0, mode = null, sessionStart = 0;
const KEY = "cq-lib-v1";
const $ = id => document.getElementById(id);

/* ===== HAPTICS ===== */
function haptic(pattern) {
  if (navigator.vibrate) navigator.vibrate(pattern);
}

/* ===== PERSIST ===== */
function load() { try { return JSON.parse(localStorage.getItem(KEY)||"{}"); } catch { return {}; } }
function save() { localStorage.setItem(KEY, JSON.stringify({ a: Object.fromEntries(answers), s: streak, b: best })); }
function restore() { const d = load(); answers = new Map(Object.entries(d.a||{})); streak = d.s||0; best = d.b||0; }

/* ===== SECTIONS ===== */
function buildSections() {
  const m = new Map();
  quiz.questions.forEach(q => { if (!m.has(q.section)) m.set(q.section, []); m.get(q.section).push(q); });
  secs = Array.from(m.entries()).map(([t, qs]) => ({ title: t, questions: qs }));
}

function secStats(sec) {
  let c = 0, a = 0;
  sec.questions.forEach(q => { const r = answers.get(q.id); if (r) { a++; if (r.c) c++; } });
  return { total: sec.questions.length, correct: c, answered: a };
}

function overall() {
  let c = 0, a = 0;
  quiz.questions.forEach(q => { const r = answers.get(q.id); if (r) { a++; if (r.c) c++; } });
  return { total: quiz.questions.length, correct: c, answered: a };
}

function mistakes() { return quiz.questions.filter(q => { const r = answers.get(q.id); return r && !r.c; }); }

/* ===== HOME ===== */
function renderHome() {
  $("home").classList.remove("hidden");
  $("quiz").classList.add("hidden");
  document.querySelector(".score-overlay")?.remove();

  const o = overall(), m = mistakes();
  $("home-sub").textContent = `${quiz.questions.length} questions across ${secs.length} sections`;
  $("home-stats").innerHTML = `<div><strong>${o.correct}</strong>correct</div><div><strong>${o.answered}</strong>answered</div><div><strong>${m.length}</strong>mistakes</div>`;
  $("btn-mistakes").textContent = `Mistakes (${m.length})`;
  $("btn-mistakes").disabled = !m.length;

  const g = $("sections"); g.innerHTML = "";
  secs.forEach(sec => {
    const st = secStats(sec), pct = st.total ? Math.round(st.correct/st.total*100) : 0;
    const circ = 2*Math.PI*20, off = circ - (pct/100)*circ;
    const d = document.createElement("div");
    d.className = `sec-card${st.correct===st.total&&st.total>0?" done":""}`;
    d.innerHTML = `
      <div class="sec-body">
        <div class="sec-title">${sec.title}</div>
        <div class="sec-meta">${st.correct}/${st.total} correct · ${st.total-st.answered} left</div>
      </div>
      <div class="sec-right">
        <div class="sec-ring"><svg viewBox="0 0 48 48"><circle class="bg" cx="24" cy="24" r="20"/><circle class="fg" cx="24" cy="24" r="20" stroke-dasharray="${circ}" stroke-dashoffset="${off}"/></svg><div class="lbl">${pct}%</div></div>
        ${st.answered>0?'<button class="sec-reset">↻</button>':""}
      </div>`;
    d.querySelector(".sec-body").addEventListener("click", () => startSec(sec.title));
    const rb = d.querySelector(".sec-reset");
    if (rb) rb.addEventListener("click", e => { e.stopPropagation(); if(!confirm(`Reset "${sec.title}"?`)) return; sec.questions.forEach(q=>answers.delete(q.id)); save(); renderHome(); });
    g.appendChild(d);
  });
}

/* ===== START MODES ===== */
function firstUnanswered(qs) { const i = qs.findIndex(q=>!answers.has(q.id)); return i===-1?0:i; }

function startSec(title) {
  const sec = secs.find(s=>s.title===title); if(!sec)return;
  mode="sec"; activeQs=sec.questions; idx=firstUnanswered(activeQs); sessionStart=Date.now(); showQuiz(title);
}
function startAll() { mode="all"; activeQs=quiz.questions; idx=firstUnanswered(activeQs); sessionStart=Date.now(); showQuiz("All Questions"); }
function startShuffle() {
  mode="shuffle"; activeQs=[...quiz.questions];
  for(let i=activeQs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[activeQs[i],activeQs[j]]=[activeQs[j],activeQs[i]];}
  idx=firstUnanswered(activeQs); sessionStart=Date.now(); showQuiz("Shuffle Mode");
}
function startMistakes() {
  const m=mistakes(); if(!m.length)return;
  m.forEach(q=>answers.delete(q.id)); save();
  mode="mistakes"; activeQs=m; idx=0; streak=0; sessionStart=Date.now(); showQuiz("Mistakes Only");
}

function showQuiz(title) {
  $("home").classList.add("hidden"); $("quiz").classList.remove("hidden");
  $("nav-title").textContent=title; renderQ(); window.scrollTo(0,0);
}

/* ===== RENDER QUESTION ===== */
function renderQ() {
  if(!activeQs.length)return;
  const q=activeQs[idx], rec=answers.get(q.id);
  $("q-num").textContent=`Q${q.number}`;
  $("q-text").textContent=q.question;

  const cc=activeQs.filter(q=>answers.get(q.id)?.c).length;
  const ac=activeQs.filter(q=>answers.has(q.id)).length;
  $("prog-fill").style.width=`${activeQs.length?(cc/activeQs.length)*100:0}%`;
  $("nav-sub").textContent=`${cc} correct · ${ac}/${activeQs.length} answered`;
  $("counter").textContent=`${idx+1} / ${activeQs.length}`;

  // Streak
  if(streak>=2){$("streak-el").classList.remove("hidden");$("streak-el").textContent=`${streak} streak`;}
  else $("streak-el").classList.add("hidden");

  // Options
  const ol=$("opts"); ol.innerHTML="";
  q.options.forEach(o => {
    const lbl=document.createElement("label"); lbl.className="opt";
    const inp=document.createElement("input"); inp.type="radio"; inp.name="c"; inp.value=o.id;
    const mk=document.createElement("div"); mk.className="opt-mark"; mk.textContent=o.id;
    const tx=document.createElement("div"); tx.className="opt-txt"; tx.textContent=o.text;
    lbl.append(inp,mk,tx);
    if(rec){
      lbl.classList.add("locked");inp.disabled=true;
      if(o.id===q.correct)lbl.classList.add("correct");
      else if(rec.sel===o.id&&!rec.c)lbl.classList.add("incorrect");
      else lbl.classList.add("dimmed");
    } else {
      lbl.addEventListener("click",e=>{e.preventDefault();answer(o.id);});
    }
    ol.appendChild(lbl);
  });

  // Feedback
  const fb=$("fb");
  if(rec){fb.className=`fb ${rec.c?"good":"bad"}`;fb.innerHTML=`<strong>${rec.c?"Correct!":"Incorrect"}</strong> The answer is ${q.correct}.`;}
  else{fb.className="fb";fb.innerHTML="";}
}

/* ===== ANSWER ===== */
function answer(optId) {
  const q=activeQs[idx]; if(answers.has(q.id))return;
  const correct=optId===q.correct;
  answers.set(q.id,{sel:optId,c:correct});

  if(correct){
    streak++; if(streak>best)best=streak;
    $("q-card").classList.add("card-pop");
    haptic([10,30,10]); // double-tap feel
  } else {
    streak=0;
    $("q-card").classList.add("shake");
    haptic(150); // long buzz
  }
  setTimeout(()=>$("q-card").classList.remove("card-pop","shake"),400);
  save(); renderQ();

  // Check if section complete
  const allDone = activeQs.every(q=>answers.has(q.id));
  if(allDone){ setTimeout(showScore, correct?800:1200); return; }

  // Auto-advance on correct
  if(correct&&idx<activeQs.length-1) setTimeout(()=>{if(answers.get(q.id)?.c)moveNext();},900);
}

/* ===== SCORE CARD ===== */
function showScore() {
  const cc=activeQs.filter(q=>answers.get(q.id)?.c).length;
  const pct=Math.round(cc/activeQs.length*100);
  const elapsed=Math.round((Date.now()-sessionStart)/1000);
  const mins=Math.floor(elapsed/60), secs_=elapsed%60;
  const emoji=pct>=90?"🏆":pct>=70?"🎉":pct>=50?"💪":"📚";
  const msg=pct>=90?"Outstanding!":pct>=70?"Great job!":pct>=50?"Getting there!":"Keep studying!";

  const ov=document.createElement("div");
  ov.className="score-overlay";
  ov.innerHTML=`<div class="score-card">
    <div class="score-emoji">${emoji}</div>
    <h2 class="score-title">${msg}</h2>
    <p class="score-sub">${$("nav-title").textContent}</p>
    <div class="score-grid">
      <div class="score-stat"><strong>${pct}%</strong>accuracy</div>
      <div class="score-stat"><strong>${cc}/${activeQs.length}</strong>correct</div>
      <div class="score-stat"><strong>${mins}:${String(secs_).padStart(2,"0")}</strong>time</div>
    </div>
    <div class="score-actions">
      <button class="primary" id="score-home">Back to Home</button>
      <button class="ghost" id="score-retry">Retry Mistakes</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
  haptic([10,50,10,50,10]); // celebration

  ov.querySelector("#score-home").addEventListener("click",renderHome);
  ov.querySelector("#score-retry").addEventListener("click",()=>{
    ov.remove();
    const m=activeQs.filter(q=>{const r=answers.get(q.id);return r&&!r.c;});
    if(!m.length){renderHome();return;}
    m.forEach(q=>answers.delete(q.id));save();
    activeQs=m;idx=0;streak=0;sessionStart=Date.now();renderQ();
  });
}

/* ===== NAV ===== */
function moveNext(){if(idx<activeQs.length-1){idx++;swipe("l");}}
function movePrev(){if(idx>0){idx--;swipe("r");}}
function swipe(d){const c=$("q-card");c.classList.add(`swipe-${d}`);setTimeout(()=>{c.classList.remove(`swipe-${d}`);renderQ();c.scrollTop=0;},130);}

/* ===== SWIPE GESTURE ===== */
function setupSwipe(){
  let sx=0,sy=0,ok=false;
  const c=$("q-card");
  c.addEventListener("touchstart",e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;ok=true;},{passive:true});
  c.addEventListener("touchend",e=>{if(!ok)return;ok=false;const dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;if(Math.abs(dx)>50&&Math.abs(dx)>Math.abs(dy)*1.5){dx<0?moveNext():movePrev();}},{passive:true});
}

/* ===== KEYBOARD ===== */
function setupKeys(){
  window.addEventListener("keydown",e=>{
    if($("quiz").classList.contains("hidden"))return;
    if(e.key==="ArrowRight")moveNext();
    else if(e.key==="ArrowLeft")movePrev();
    else if(e.key>="1"&&e.key<="4"){const q=activeQs[idx];if(!answers.has(q.id)){answer(["A","B","C","D"][+e.key-1]);}}
    else if(e.key==="Escape")renderHome();
  });
}

/* ===== WIRE ===== */
$("btn-back").addEventListener("click",renderHome);
$("btn-all").addEventListener("click",startAll);
$("btn-shuffle").addEventListener("click",startShuffle);
$("btn-mistakes").addEventListener("click",startMistakes);
$("btn-prev").addEventListener("click",movePrev);
$("btn-next").addEventListener("click",moveNext);
$("btn-reset-session").addEventListener("click",()=>{
  if(!confirm("Reset this session?"))return;
  activeQs.forEach(q=>answers.delete(q.id));streak=0;idx=0;save();renderQ();
});
$("btn-reset-all").addEventListener("click",()=>{
  if(!confirm("Reset ALL progress?"))return;
  answers.clear();streak=0;best=0;save();renderHome();
});
setupSwipe();
setupKeys();

/* ===== INIT ===== */
quiz = QUIZ_DATA;
buildSections();
restore();
renderHome();
</script>
